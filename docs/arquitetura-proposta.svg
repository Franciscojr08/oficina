<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura proposta - Oficina API</title>
  <desc id="desc">Diagrama da arquitetura proposta com componentes da aplicacao, infraestrutura AWS provisionada e fluxo de deploy via GitHub Actions.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #102a5c; }
      .section-title { font: 700 20px Arial, sans-serif; fill: #102a5c; }
      .box-title { font: 700 17px Arial, sans-serif; fill: #111827; }
      .text { font: 14px Arial, sans-serif; fill: #1f2937; }
      .small { font: 12px Arial, sans-serif; fill: #374151; }
      .tiny { font: 11px Arial, sans-serif; fill: #374151; }
      .panel { fill: #ffffff; stroke: #1d4ed8; stroke-width: 2; rx: 12; }
      .app-panel { fill: #ffffff; stroke: #15803d; stroke-width: 2; rx: 12; }
      .infra-panel { fill: #ffffff; stroke: #1d4ed8; stroke-width: 2; rx: 12; }
      .deploy-panel { fill: #ffffff; stroke: #1d4ed8; stroke-width: 2; rx: 12; }
      .box { fill: #f8fafc; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
      .green-box { fill: #f7fff8; stroke: #15803d; stroke-width: 1.5; rx: 8; }
      .dashed { fill: none; stroke: #2563eb; stroke-width: 1.5; stroke-dasharray: 7 5; rx: 8; }
      .secret { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
      .arrow { stroke: #1d4ed8; stroke-width: 2.5; fill: none; marker-end: url(#arrowBlue); }
      .green-arrow { stroke: #15803d; stroke-width: 2.5; fill: none; marker-end: url(#arrowGreen); }
      .dotted-arrow { stroke: #15803d; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrowGreen); }
      .deploy-arrow { stroke: #1d4ed8; stroke-width: 2; fill: none; marker-end: url(#arrowBlue); }
      .icon { font: 700 22px Arial, sans-serif; fill: #1d4ed8; }
      .num { font: 700 14px Arial, sans-serif; fill: #ffffff; }
    </style>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="800" y="44" text-anchor="middle">Arquitetura proposta - Oficina API</text>

  <!-- Usuarios e canais -->
  <rect class="panel" x="35" y="70" width="260" height="560"/>
  <text class="section-title" x="165" y="103" text-anchor="middle">Usuários e canais</text>

  <rect class="box" x="60" y="130" width="210" height="110"/>
  <text class="icon" x="165" y="166" text-anchor="middle">USER</text>
  <text class="box-title" x="165" y="196" text-anchor="middle">Cliente / Atendente</text>
  <text class="box-title" x="165" y="220" text-anchor="middle">Admin</text>

  <rect class="box" x="60" y="275" width="210" height="110"/>
  <text class="icon" x="165" y="313" text-anchor="middle">&lt;/&gt;</text>
  <text class="box-title" x="165" y="344" text-anchor="middle">Swagger / OpenAPI</text>
  <text class="small" x="165" y="368" text-anchor="middle">/oficina/v1/swagger-ui.html</text>

  <rect class="box" x="60" y="420" width="210" height="145"/>
  <text class="icon" x="165" y="458" text-anchor="middle">API</text>
  <text class="box-title" x="165" y="491" text-anchor="middle">API pública de</text>
  <text class="box-title" x="165" y="515" text-anchor="middle">acompanhamento</text>
  <text class="small" x="165" y="548" text-anchor="middle">GET /public/ordens/</text>
  <text class="small" x="165" y="566" text-anchor="middle">codigo/{codigo}</text>

  <!-- Aplicacao -->
  <rect class="app-panel" x="420" y="70" width="500" height="560"/>
  <text class="section-title" x="670" y="103" text-anchor="middle" fill="#166534">Aplicação Spring Boot 4 / Java 17</text>

  <rect class="green-box" x="445" y="130" width="450" height="64"/>
  <text class="box-title" x="515" y="169">Controllers REST</text>
  <text class="small" x="715" y="169">endpoints /oficina/v1</text>

  <rect class="green-box" x="445" y="220" width="450" height="64"/>
  <text class="box-title" x="515" y="259">Auth + JWT + Security Filter</text>

  <rect class="green-box" x="445" y="310" width="450" height="64"/>
  <text class="box-title" x="515" y="349">Casos de uso / Services</text>

  <rect class="green-box" x="445" y="400" width="450" height="80"/>
  <text class="box-title" x="515" y="433">Domínio</text>
  <text class="text" x="515" y="458">Cliente, Veículo, OS, Estoque, Serviços, Itens</text>

  <rect class="green-box" x="445" y="505" width="450" height="64"/>
  <text class="box-title" x="515" y="544">Repositories Spring Data JPA</text>

  <rect class="green-box" x="445" y="590" width="450" height="28"/>
  <text class="small" x="515" y="609">Shared: validações, exceções, CPF/CNPJ, placa, OpenAPI</text>

  <path class="green-arrow" d="M670 194 V220"/>
  <path class="green-arrow" d="M670 284 V310"/>
  <path class="green-arrow" d="M670 374 V400"/>
  <path class="green-arrow" d="M670 480 V505"/>
  <path class="green-arrow" d="M670 569 V590"/>

  <path class="arrow" d="M270 185 H410"/>
  <text class="small" x="337" y="170" text-anchor="middle">Login</text>
  <path class="arrow" d="M270 330 H410"/>
  <text class="small" x="337" y="315" text-anchor="middle">Rotas protegidas</text>
  <path class="arrow" d="M270 490 H410"/>
  <text class="small" x="337" y="475" text-anchor="middle">Consulta pública</text>

  <rect class="green-box" x="945" y="205" width="130" height="82" stroke-dasharray="6 5"/>
  <text class="small" x="1010" y="230" text-anchor="middle">Login → JWT</text>
  <text class="small" x="1010" y="252" text-anchor="middle">Authorization:</text>
  <text class="small" x="1010" y="270" text-anchor="middle">Bearer token</text>
  <path class="dotted-arrow" d="M895 252 H945"/>

  <!-- Infra -->
  <rect class="infra-panel" x="1110" y="70" width="455" height="560"/>
  <text class="section-title" x="1338" y="103" text-anchor="middle">Infraestrutura AWS provisionada</text>

  <rect class="box" x="1190" y="125" width="295" height="46"/>
  <text class="box-title" x="1338" y="154" text-anchor="middle">Internet</text>

  <rect class="box" x="1170" y="200" width="335" height="52"/>
  <text class="box-title" x="1338" y="233" text-anchor="middle">AWS Load Balancer</text>

  <rect class="dashed" x="1145" y="282" width="390" height="215"/>
  <text class="box-title" x="1340" y="311" text-anchor="middle">EKS Cluster</text>
  <text class="small" x="1340" y="333" text-anchor="middle">Namespace oficina</text>

  <rect class="box" x="1170" y="355" width="170" height="62"/>
  <text class="box-title" x="1255" y="382" text-anchor="middle">Deployment</text>
  <text class="small" x="1255" y="403" text-anchor="middle">oficina-api</text>

  <rect class="box" x="1170" y="435" width="170" height="42"/>
  <text class="small" x="1255" y="461" text-anchor="middle">Pods Spring Boot</text>

  <rect class="box" x="1370" y="355" width="70" height="62"/>
  <text class="box-title" x="1405" y="391" text-anchor="middle">HPA</text>

  <rect class="box" x="1455" y="340" width="72" height="62"/>
  <text class="small" x="1491" y="365" text-anchor="middle">ConfigMap</text>
  <text class="tiny" x="1491" y="385" text-anchor="middle">oficina-config</text>

  <rect class="secret" x="1455" y="420" width="72" height="62"/>
  <text class="small" x="1491" y="445" text-anchor="middle">Secret</text>
  <text class="tiny" x="1491" y="465" text-anchor="middle">JWT + DB</text>

  <rect class="box" x="1170" y="525" width="335" height="62"/>
  <text class="box-title" x="1338" y="552" text-anchor="middle">RDS PostgreSQL privado</text>
  <text class="small" x="1338" y="574" text-anchor="middle">Banco transacional + schema Flyway</text>

  <rect class="dashed" x="1145" y="610" width="390" height="78"/>
  <text class="box-title" x="1340" y="636" text-anchor="middle">VPC default / subnets / security group</text>
  <text class="small" x="1240" y="665" text-anchor="middle">Subnets EKS</text>
  <text class="small" x="1350" y="665" text-anchor="middle">Subnets DB</text>
  <text class="small" x="1465" y="665" text-anchor="middle">SG RDS 5432</text>

  <path class="arrow" d="M1338 171 V200"/>
  <path class="arrow" d="M1338 252 V282"/>
  <path class="arrow" d="M1255 417 V435"/>
  <path class="arrow" d="M1255 477 V525"/>
  <path class="arrow" d="M1338 587 V610"/>
  <path class="green-arrow" d="M920 340 H1100"/>
  <path class="dotted-arrow" d="M895 537 H1050 C1090 537 1090 556 1170 556"/>
  <text class="small" x="1030" y="526" text-anchor="middle">JPA + Flyway</text>

  <!-- Deploy flow -->
  <rect class="deploy-panel" x="35" y="710" width="1530" height="155"/>
  <text class="section-title" x="800" y="742" text-anchor="middle">Fluxo de deploy GitHub Actions</text>

  <g transform="translate(55 765)">
    <rect class="box" width="120" height="70"/>
    <circle cx="18" cy="-8" r="14" fill="#1d4ed8"/><text class="num" x="18" y="-3" text-anchor="middle">1</text>
    <text class="small" x="60" y="30" text-anchor="middle">Checkout</text>
    <text class="tiny" x="60" y="50" text-anchor="middle">repo</text>
  </g>
  <g transform="translate(205 765)">
    <rect class="box" width="140" height="70"/>
    <circle cx="18" cy="-8" r="14" fill="#1d4ed8"/><text class="num" x="18" y="-3" text-anchor="middle">2</text>
    <text class="small" x="70" y="28" text-anchor="middle">Testes Maven</text>
    <text class="tiny" x="70" y="50" text-anchor="middle">PostgreSQL serviço</text>
  </g>
  <g transform="translate(375 765)">
    <rect class="box" width="115" height="70"/>
    <circle cx="18" cy="-8" r="14" fill="#1d4ed8"/><text class="num" x="18" y="-3" text-anchor="middle">3</text>
    <text class="small" x="57" y="40" text-anchor="middle">Package</text>
  </g>
  <g transform="translate(520 765)">
    <rect class="box" width="125" height="70"/>
    <circle cx="18" cy="-8" r="14" fill="#1d4ed8"/><text class="num" x="18" y="-3" text-anchor="middle">4</text>
    <text class="small" x="62" y="30" text-anchor="middle">Docker build</text>
    <text class="tiny" x="62" y="50" text-anchor="middle">Java 17 jar</text>
  </g>
  <g transform="translate(675 765)">
    <rect class="box" width="155" height="70"/>
    <circle cx="18" cy="-8" r="14" fill="#1d4ed8"/><text class="num" x="18" y="-3" text-anchor="middle">5</text>
    <text class="small" x="77" y="24" text-anchor="middle">Push Docker Hub</text>
    <text class="tiny" x="77" y="44" text-anchor="middle">anthonymeds/oficina-api</text>
    <text class="tiny" x="77" y="60" text-anchor="middle">&lt;SHA&gt;</text>
  </g>
  <g transform="translate(860 765)">
    <rect class="box" width="145" height="70"/>
    <circle cx="18" cy="-8" r="14" fill="#1d4ed8"/><text class="num" x="18" y="-3" text-anchor="middle">6</text>
    <text class="small" x="72" y="28" text-anchor="middle">Terraform</text>
    <text class="tiny" x="72" y="50" text-anchor="middle">init / plan / apply</text>
  </g>
  <g transform="translate(1035 765)">
    <rect class="box" width="120" height="70"/>
    <circle cx="18" cy="-8" r="14" fill="#1d4ed8"/><text class="num" x="18" y="-3" text-anchor="middle">7</text>
    <text class="small" x="60" y="30" text-anchor="middle">kubeconfig</text>
    <text class="tiny" x="60" y="50" text-anchor="middle">EKS</text>
  </g>
  <g transform="translate(1185 765)">
    <rect class="box" width="135" height="70"/>
    <circle cx="18" cy="-8" r="14" fill="#1d4ed8"/><text class="num" x="18" y="-3" text-anchor="middle">8</text>
    <text class="small" x="67" y="28" text-anchor="middle">ConfigMap</text>
    <text class="tiny" x="67" y="50" text-anchor="middle">endpoint RDS</text>
  </g>
  <g transform="translate(1350 765)">
    <rect class="box" width="120" height="70"/>
    <circle cx="18" cy="-8" r="14" fill="#1d4ed8"/><text class="num" x="18" y="-3" text-anchor="middle">9</text>
    <text class="small" x="60" y="28" text-anchor="middle">kubectl apply</text>
    <text class="tiny" x="60" y="50" text-anchor="middle">manifests</text>
  </g>
  <g transform="translate(1490 765)">
    <rect class="box" width="60" height="70"/>
    <circle cx="18" cy="-8" r="14" fill="#1d4ed8"/><text class="num" x="18" y="-3" text-anchor="middle">10</text>
    <text class="tiny" x="30" y="26" text-anchor="middle">rollout</text>
    <text class="tiny" x="30" y="44" text-anchor="middle">smoke</text>
    <text class="tiny" x="30" y="60" text-anchor="middle">api-docs</text>
  </g>

  <path class="deploy-arrow" d="M175 800 H205"/>
  <path class="deploy-arrow" d="M345 800 H375"/>
  <path class="deploy-arrow" d="M490 800 H520"/>
  <path class="deploy-arrow" d="M645 800 H675"/>
  <path class="deploy-arrow" d="M830 800 H860"/>
  <path class="deploy-arrow" d="M1005 800 H1035"/>
  <path class="deploy-arrow" d="M1155 800 H1185"/>
  <path class="deploy-arrow" d="M1320 800 H1350"/>
  <path class="deploy-arrow" d="M1470 800 H1490"/>

  <!-- Local dev note -->
  <rect class="box" x="35" y="645" width="670" height="42"/>
  <text class="small" x="55" y="671">Ambiente local: Docker Compose sobe app_oficina em :8080 e postgres_oficina em :5432 com volume postgres_data.</text>
  <rect class="green-box" x="725" y="645" width="840" height="42"/>
  <text class="small" x="745" y="671">Fluxo de dados: usuários acessam LB/API; API valida JWT, executa regras de negócio, persiste via JPA e migra schema com Flyway.</text>
</svg>
