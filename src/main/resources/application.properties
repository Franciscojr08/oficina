# Endpoint
server.servlet.context-path=/oficina/v1

# Name
spring.application.name=oficina

# Porta
server.port=8080

# Datasource local
spring.datasource.url=jdbc:postgresql://localhost:5432/oficina
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
security.jwt.secret=${SECURITY_JWT_SECRET:jwt-local-secret-123456789012345678901234567890}
security.jwt.expiration=${SECURITY_JWT_EXPIRATION:7200000}