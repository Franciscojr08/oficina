# Datasource de teste/local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/oficina}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=2

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT de teste
security.jwt.secret=${SECURITY_JWT_SECRET:jwt-test-secret-123456789012345678901234567890}
security.jwt.expiration=${SECURITY_JWT_EXPIRATION:7200000}